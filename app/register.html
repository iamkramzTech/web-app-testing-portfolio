<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-50 py-4">

<main class="form-signin w-100 m-auto">
    <h2>Register</h2>
<form id="registerForm">
    <p id="registerMessage"></p>
   <div class="form-floating mb-3">
    <input type="text" class="form-control" id="name" placeholder="Full Name">
     <label for="name">Full Name</label>
    </div>
    <div class="form-floating mb-3">
    <input type="text" class="form-control" id="email" placeholder="Email">
     <label for="email">Email Address</label>
    </div>
    <div class="form-floating mb-3">
    <input type="password" class="form-control" id="password" placeholder="Password">
    <label for="password">Password</label>
    </div>
    
    <div class="form-floating mb-3">
    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password">
    <label for="confirmPassword">Confirm Password</label>
    </div>
    <button class="btn btn-primary w-100 py-2" type="submit">Register</button>
</form>


<a href="index.html">Go to Login</a>

<footer class="py-3 my-4"> <ul class="nav justify-content-center border-bottom pb-3 mb-3"> <p class="text-center text-body-secondary">© 2025 iamkramzTech</p> </footer>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
